server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # SPA: all routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
